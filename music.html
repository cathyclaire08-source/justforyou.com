<!DOCTYPE html>
<html>
<head>
<title>Music</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #081526;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}

/* PAGE TITLE (OUTSIDE CARD) */
.page-title {
    font-size: 32px;
    color: #66d9ff;
    font-weight: bold;
    margin-bottom: 25px;
}

/* MUSIC CARD */
.card {
    background: #0f2a44;
    width: 320px;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

/* MUSIC ICON */
.music-icon {
    font-size: 60px;
    margin-bottom: 10px;
    animation: float 2s infinite ease-in-out;
}

@keyframes float {
    50% { transform: translateY(-8px); }
}

/* 🎯 SONG TITLE (EDIT THIS EASILY) */
.song-title {
    font-size: 22px;
    color: #ffffff;
    font-weight: bold;
    margin-bottom: 5px;
}

/* DESCRIPTION */
.card p {
    font-size: 13px;
    color: #cceeff;
    margin-bottom: 15px;
}

/* AUDIO */
audio {
    width: 100%;
    margin-top: 10px;
}

/* BUTTONS */
button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    background: #66d9ff;
    color: black;
    font-weight: bold;
    border-radius: 20px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
}

button:hover {
    background: #4cc7ff;
}

/* BACK */
a {
    display: block;
    margin-top: 15px;
    color: #66d9ff;
    font-size: 14px;
    text-decoration: none;
}
</style>

</head>

<body>

<!-- OUTSIDE TITLE -->
<div class="page-title">Your Song</div>

<!-- MUSIC CARD -->
<div class="card">

    <div class="music-icon">🎧</div>

    <!-- ✏️ EDIT THIS SONG TITLE -->
    <div class="song-title">Celebration –
 Kool & the Gang</div>

    <p>Made just for you 💙</p>

    <audio id="mySong">
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <button onclick="document.getElementById('mySong').play()">
        ▶ Play Music
    </button>

    <button onclick="document.getElementById('mySong').pause()">
        ⏸ Pause
    </button>

    <a href="index.html">⬅ Back</a>

</div>

</body>
</html>
